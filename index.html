  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css">
  <style>
    /* ── TOKENS ─────────────────────────────────────────── */
    :root {
      --papier:       #F6F3EE;
      --ardoise:      #1A1C1A;
      --sapin:        #2D6A4F;
      --sapin-hover:  #245840;
      --sauge:        #E8EDE9;
      --sauge-mid:    #D4DDD6;
      --border:       rgba(45,106,79,0.14);
      --text-muted:   rgba(26,28,26,0.5);
      --text-body:    rgba(26,28,26,0.78);
      --max:          1080px;
      --r:            10px;
    }
    /* ── RESET ───────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--papier);
      color: var(--ardoise);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    /* ── NAV ─────────────────────────────────────────────── */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      padding: 1rem 1.5rem;
      transition: background 0.3s, border-color 0.3s;
    }
    header.scrolled {
      background: rgba(246,243,238,0.94);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }
    nav {
      max-width: var(--max);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .nav-logo-mark {
      width: 28px;
      height: auto;
    }
    .nav-logo-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--ardoise);
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-body);
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .nav-links a:hover { background: var(--sauge); color: var(--ardoise); }
    .nav-cta {
      background: var(--sapin) !important;
      color: var(--papier) !important;
    }
    .nav-cta:hover { background: var(--sapin-hover) !important; }
    /* Mobile toggle */
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }
    .menu-toggle span {
      display: block;
      width: 20px;
      height: 1.5px;
      background: var(--ardoise);
      margin: 5px 0;
      transition: transform 0.2s, opacity 0.2s;
    }
    .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(4.5px, 4.5px); }
    .menu-toggle.active span:nth-child(2) { opacity: 0; }
    .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(4.5px, -4.5px); }
    /* ── HERO ────────────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10rem 1.5rem 6rem;
      position: relative;
      border-bottom: 0.5px solid var(--border);
    }
    /* Grain texture subtile */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }
    .hero-inner {
      max-width: var(--max);
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--sapin);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: rise 0.7s ease-out 0.1s forwards;
    }
    .hero-eyebrow::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--sapin);
    }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 400;
      line-height: 1.08;
      color: var(--ardoise);
      max-width: 820px;
      margin-bottom: 1.75rem;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: rise 0.7s ease-out 0.2s forwards;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--sapin);
    }
    .hero-sub {
      font-size: 1.05rem;
      color: var(--text-body);
      max-width: 520px;
      line-height: 1.75;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: rise 0.7s ease-out 0.3s forwards;
    }
    .hero-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: rise 0.7s ease-out 0.4s forwards;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0.8rem 1.5rem;
      border-radius: var(--r);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary { background: var(--sapin); color: var(--papier); }
    .btn-primary:hover { background: var(--sapin-hover); transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--ardoise); border: 0.5px solid var(--border); }
    .btn-ghost:hover { background: var(--sauge); }
    /* Hero stat strip */
    .hero-stats {
      display: flex;
      gap: 2.5rem;
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 0.5px solid var(--border);
      opacity: 0;
      animation: rise 0.7s ease-out 0.55s forwards;
    }
    .hero-stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      color: var(--ardoise);
      line-height: 1;
    }
    .hero-stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* ── SECTIONS ────────────────────────────────────────── */
    section { padding: 6rem 1.5rem; }
    .container { max-width: var(--max); margin: 0 auto; }
    .section-label {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sapin);
      margin-bottom: 1rem;
    }
    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 3.5vw, 2.75rem);
      font-weight: 400;
      line-height: 1.15;
      color: var(--ardoise);
      margin-bottom: 1rem;
    }
    .section-title em { font-style: italic; color: var(--sapin); }
    .section-body {
      font-size: 1rem;
      color: var(--text-body);
      max-width: 520px;
      line-height: 1.75;
    }
    /* Reveal */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-d1 { transition-delay: 0.1s; }
    .reveal-d2 { transition-delay: 0.2s; }
    .reveal-d3 { transition-delay: 0.3s; }
    .reveal-d4 { transition-delay: 0.4s; }
    /* ── PROBLÈME ────────────────────────────────────────── */
    .problem {
      background: var(--ardoise);
      color: var(--papier);
      border-top: 0.5px solid rgba(255,255,255,0.06);
      border-bottom: 0.5px solid rgba(255,255,255,0.06);
    }
    .problem .section-label { color: rgba(246,243,238,0.45); }
    .problem .section-title { color: var(--papier); }
    .problem .section-body { color: rgba(246,243,238,0.65); max-width: 100%; }
    .problem-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem 5rem;
      align-items: start;
      margin-top: 3.5rem;
    }
    .problem-left {}
    .problem-pains {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .pain-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.25rem 0;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }
    .pain-item:last-child { border-bottom: none; }
    .pain-icon {
      width: 38px;
      height: 38px;
      min-width: 38px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }
    .pain-icon i { font-size: 18px; color: rgba(246,243,238,0.5); }
    .pain-text strong { display: block; font-size: 0.95rem; font-weight: 600; color: var(--papier); margin-bottom: 3px; }
    .pain-text p { font-size: 0.85rem; color: rgba(246,243,238,0.5); line-height: 1.6; }
    /* ── FONCTIONNEMENT ──────────────────────────────────── */
    .how { background: var(--sauge); }
    .tabs-wrap {
      display: flex;
      gap: 6px;
      margin: 2.5rem 0 3rem;      border-bottom: 0.5px solid var(--sauge-mid);
      padding-bottom: 0;
    }
    .tab-btn {
      padding: 0.6rem 1.1rem;
      background: none;
      border: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -0.5px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active { color: var(--sapin); border-bottom-color: var(--sapin); }
    .tab-content { display: none; }
    .tab-content.active { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .step-card {
      background: var(--papier);
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      padding: 1.5rem;
    }
    .step-num {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--sauge-mid);
      line-height: 1;
      margin-bottom: 1rem;
    }
    .step-card h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--ardoise); }
    .step-card p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.65; }
    /* ── BÉNÉFICES ───────────────────────────────────────── */
    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      margin-top: 3rem;
    }
    .benefit-card {
      background: var(--papier);
      padding: 2rem 1.75rem;
      border-right: 0.5px solid var(--border);
      border-bottom: 0.5px solid var(--border);
      transition: background 0.2s;
    }
    .benefit-card:hover { background: var(--sauge); }
    .benefit-card:nth-child(3n) { border-right: none; }
    .benefit-card:nth-child(4), .benefit-card:nth-child(5), .benefit-card:nth-child(6) { border-bottom: none; }
    .benefit-icon {
      width: 40px;
      height: 40px;
      border-radius: 9px;
      background: rgba(45,106,79,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }
    .benefit-icon i { font-size: 20px; color: var(--sapin); }
    .benefit-card h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.5rem; }
    .benefit-card p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.65; }
    /* ── SOCIAL PROOF ────────────────────────────────────── */
    .proof { background: var(--papier); }
    .proof-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 3rem;
    }
    .proof-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    .proof-card {
      background: var(--sauge);
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      padding: 1.75rem;
    }
    .proof-quote {
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem;
      font-style: italic;
      color: var(--ardoise);
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }
    .proof-author { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }
    .proof-role { font-size: 0.78rem; color: var(--text-muted); opacity: 0.7; margin-top: 2px; }
    /* ── CTA INSCRIPTION ─────────────────────────────────── */
    .cta-section {
      background: var(--sapin);
      padding: 5rem 1.5rem;
    }
    .cta-inner {
      max-width: 640px;
      margin: 0 auto;
      text-align
